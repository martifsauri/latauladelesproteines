/* ============================================================
   APP
   ============================================================ */
const W = {prot:1.5,ferro:1,vit:1,lip:1,omega:1,bio:1.5,col:1,cont:1,dens:2};
const WMAX = 5*Object.values(W).reduce((a,b)=>a+b,0);
function calcScore(r) {
  const t = Object.keys(W).reduce((s,k) => s + r[k]*W[k], 0);
  return Math.round((t/WMAX)*50)/10;
}

const ITEMS = [];
let currentSectionId = "";
RAW.forEach(r => {
  if (r.sectionId) { currentSectionId = r.sectionId; return; }
  ITEMS.push({...r, sectionId: currentSectionId, score: calcScore(r)});
});

const SECTION_IDS = [...new Set(ITEMS.map(i => i.sectionId))];
let activeSections = new Set(SECTION_IDS);
let activeTag = 'all';
let searchQ = '';
let sortCol = 'score';
let sortDir = -1;
const PRICE_LO = 0, PRICE_HI = 70;
const SCORE_LO = 1, SCORE_HI = 5;
let priceMin = PRICE_LO, priceMax = PRICE_HI;
let scoreMin = SCORE_LO, scoreMax = SCORE_HI;
let excludedIds = new Set(JSON.parse(localStorage.getItem('excludedIds') || '[]'));
let lang = (localStorage.getItem('lang')) || (navigator.language && navigator.language.toLowerCase().startsWith('en') ? 'en' : 'ca');

function t() { return I18N[lang]; }
function pill(n) { return `<span class="pill s${n}">${n}</span>`; }
function scorePill(n) {
  const cls = n>=4.5?'s5':n>=3.8?'s4':n>=3.0?'s3':n>=2.2?'s2':'s1';
  return `<span class="pill ${cls} score-cell">${n.toFixed(1)}</span>`;
}
function tagBadges(arr) { return arr.map(t=>`<span class="badge b${t}">${t}</span>`).join(''); }

function getFiltered() {
  const items = t().items;
  return ITEMS.filter(r => {
    if (excludedIds.has(r.id)) return false;
    if (!activeSections.has(r.sectionId)) return false;
    if (activeTag !== 'all' && !r.tags.includes(activeTag)) return false;
    if (r.score < scoreMin || r.score > scoreMax) return false;
    // Price overlap: keep items whose price range intersects [priceMin, priceMax]
    if (r.priceMax < priceMin || r.priceMin > priceMax) return false;
    if (searchQ) {
      const name = (items[r.id] && items[r.id].name) || r.id;
      if (!name.toLowerCase().includes(searchQ.toLowerCase())) return false;
    }
    return true;
  });
}

function getSorted(items) {
  if (!sortCol) return items;
  const i18nItems = t().items;
  return [...items].sort((a,b) => {
    let av, bv;
    if (sortCol === 'name') {
      av = (i18nItems[a.id] && i18nItems[a.id].name) || a.id;
      bv = (i18nItems[b.id] && i18nItems[b.id].name) || b.id;
      return av.localeCompare(bv, lang) * sortDir;
    }
    if (sortCol === 'price') { av = a.priceMin; bv = b.priceMin; }
    else { av = a[sortCol]; bv = b[sortCol]; }
    return (av - bv) * sortDir;
  });
}

function rowHtml(r) {
  const i18nItem = t().items[r.id] || {name: r.id, note: ""};
  const notePart = i18nItem.note ? `<span class="name-note">${i18nItem.note}</span>` : '';
  const priceUnit = r.priceUnit === 'dozen' ? ` ${t().perDozen}` : '';
  return `<tr>
    <td class="name">${i18nItem.name}${notePart}</td>
    <td>${pill(r.prot)}</td>
    <td>${pill(r.ferro)}</td>
    <td>${pill(r.vit)}</td>
    <td>${pill(r.lip)}</td>
    <td>${pill(r.omega)}</td>
    <td>${pill(r.bio)}</td>
    <td>${pill(r.col)}</td>
    <td>${pill(r.cont)}</td>
    <td>${pill(r.dens)}</td>
    <td class="price col-div">${r.price} €${priceUnit}</td>
    <td class="col-div">${scorePill(r.score)}</td>
    <td>${tagBadges(r.tags)}</td>
  </tr>`;
}

function renderHead() {
  const c = t().cols;
  document.getElementById('theadRow').innerHTML = `
    <th class="left" data-col="name" style="min-width:210px;">${c.name} <span class="sort-icon">↕</span></th>
    <th data-col="prot">${c.prot} <span class="sort-icon">↕</span></th>
    <th data-col="ferro">${c.ferro} <span class="sort-icon">↕</span></th>
    <th data-col="vit">${c.vit} <span class="sort-icon">↕</span></th>
    <th data-col="lip">${c.lip} <span class="sort-icon">↕</span></th>
    <th data-col="omega">${c.omega} <span class="sort-icon">↕</span></th>
    <th data-col="bio">${c.bio} <span class="sort-icon">↕</span></th>
    <th data-col="col">${c.col} <span class="sort-icon">↕</span></th>
    <th data-col="cont">${c.cont} <span class="sort-icon">↕</span></th>
    <th data-col="dens">${c.dens} <span class="sort-icon">↕</span></th>
    <th class="col-div" data-col="price" style="min-width:80px;">${c.price} <span class="sort-icon">↕</span></th>
    <th class="col-div" data-col="score" style="min-width:80px;">${c.score} <span class="sort-icon">↕</span></th>
    <th>${c.profile}</th>
  `;
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) { sortDir *= -1; }
      else { sortCol = col; sortDir = col === 'name' ? 1 : -1; }
      renderAll();
    });
    if (th.dataset.col === sortCol) {
      th.classList.add('sorted');
      const icon = th.querySelector('.sort-icon');
      if (icon) icon.textContent = sortDir === 1 ? '↑' : '↓';
    }
  });
}

function renderSectionChips() {
  const container = document.getElementById('sectionChips');
  container.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeSections.size === SECTION_IDS.length ? ' active' : '');
  allChip.textContent = t().allSections;
  allChip.addEventListener('click', () => {
    activeSections = new Set(SECTION_IDS);
    renderSectionChips();
    renderTable();
  });
  container.appendChild(allChip);

  SECTION_IDS.forEach(sid => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeSections.has(sid) ? ' active' : '');
    chip.textContent = t().sectionNames[sid] || sid;
    chip.dataset.section = sid;
    chip.addEventListener('click', () => {
      if (activeSections.has(sid)) activeSections.delete(sid);
      else activeSections.add(sid);
      renderSectionChips();
      renderTable();
    });
    container.appendChild(chip);
  });
}

function renderTable() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  document.getElementById('countShown').textContent = sorted.length;

  const tbody = document.getElementById('tbody');
  if (sorted.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="13">${t().noResults}</td></tr>`;
    return;
  }

  const isDefault = sortCol === 'score' && sortDir === -1 && !searchQ && activeTag === 'all';
  let html = '';

  if (isDefault) {
    const groups = {};
    sorted.forEach(r => {
      if (!groups[r.sectionId]) groups[r.sectionId] = [];
      groups[r.sectionId].push(r);
    });
    SECTION_IDS.filter(s => groups[s]).forEach(sid => {
      html += `<tr class="section-row"><td colspan="13">${t().sectionNames[sid] || sid}</td></tr>`;
      groups[sid].forEach(r => { html += rowHtml(r); });
    });
  } else {
    sorted.forEach(r => { html += rowHtml(r); });
  }

  tbody.innerHTML = html;
}

function renderLegend() {
  const L = t().legend;
  document.getElementById('legend').innerHTML = `
    <span style="font-size:11px;font-weight:500;color:var(--text);">${L.rating}</span>
    <span><span class="pill s5" style="font-size:10px;padding:1px 5px;">5</span> ${L.s5}</span>
    <span><span class="pill s4" style="font-size:10px;padding:1px 5px;">4</span> ${L.s4}</span>
    <span><span class="pill s3" style="font-size:10px;padding:1px 5px;">3</span> ${L.s3}</span>
    <span><span class="pill s2" style="font-size:10px;padding:1px 5px;">2</span> ${L.s2}</span>
    <span><span class="pill s1" style="font-size:10px;padding:1px 5px;">1</span> ${L.s1}</span>
    &nbsp;·&nbsp;
    <span><span class="badge bL">L</span> ${L.L}</span>
    <span><span class="badge bM">M</span> ${L.M}</span>
    <span><span class="badge bT">T</span> ${L.T}</span>
  `;
}

function renderFooter() {
  document.getElementById('footer').innerHTML = t().footer
    .map(([b, rest]) => `<b>${b}</b>${rest}`)
    .join('<br>');
}

function renderStaticLabels() {
  const T = t();
  document.documentElement.lang = T.htmlLang;
  document.title = T.docTitle;
  document.getElementById('pageTitle').textContent = T.title;
  document.getElementById('pageSubtitle').textContent = T.subtitle;
  document.getElementById('searchInput').placeholder = T.searchPlaceholder;
  document.getElementById('lblProfile').textContent = T.profile;
  document.getElementById('tagAll').textContent = T.all;
  document.getElementById('lblSections').textContent = T.sections;
  document.getElementById('lblPriceRange').textContent = T.priceRange;
  document.getElementById('lblScoreRange').textContent = T.scoreRange;
  updateRangeDisplays();
  document.getElementById('lblShowing').textContent = T.showing;
  document.getElementById('lblOf').textContent = T.of;
  document.getElementById('lblProteins').textContent = T.proteins;
  document.getElementById('countTotal').textContent = ITEMS.length;
}

function renderItemPicker() {
  const T = t();
  document.getElementById('pickAll').textContent = T.pickAll;
  document.getElementById('pickNone').textContent = T.pickNone;
  const list = document.getElementById('pickerList');
  let html = '';
  SECTION_IDS.forEach(sid => {
    const sectionItems = ITEMS.filter(i => i.sectionId === sid);
    if (sectionItems.length === 0) return;
    html += `<div class="dropdown-section">${T.sectionNames[sid] || sid}</div>`;
    sectionItems.forEach(r => {
      const name = (T.items[r.id] && T.items[r.id].name) || r.id;
      const excluded = excludedIds.has(r.id);
      html += `<label class="dropdown-item${excluded ? ' excluded' : ''}">
        <input type="checkbox" data-id="${r.id}" ${excluded ? '' : 'checked'}>
        <span>${name}</span>
      </label>`;
    });
  });
  list.innerHTML = html;
  list.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = cb.dataset.id;
      if (cb.checked) excludedIds.delete(id);
      else excludedIds.add(id);
      localStorage.setItem('excludedIds', JSON.stringify([...excludedIds]));
      cb.closest('.dropdown-item').classList.toggle('excluded', !cb.checked);
      renderTable();
    });
  });
}

function renderAll() {
  renderStaticLabels();
  renderHead();
  renderSectionChips();
  renderLegend();
  renderFooter();
  renderItemPicker();
  renderTable();
}

/* events */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  renderTable();
});

document.querySelectorAll('.btn-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTag = btn.dataset.tag;
    document.querySelectorAll('.btn-filter').forEach(b => {
      b.className = 'btn-filter';
      if (b.dataset.tag === activeTag) b.classList.add('active-' + activeTag);
    });
    renderTable();
  });
});

document.querySelectorAll('.lang-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    localStorage.setItem('lang', lang);
    document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    renderAll();
  });
});

/* dual-range sliders (price + score) */
function updateRangeDisplays() {
  document.getElementById('priceDisplay').textContent = `${priceMin}–${priceMax} €`;
  document.getElementById('scoreDisplay').textContent = `${scoreMin.toFixed(1)}–${scoreMax.toFixed(1)}`;
  paintTrack('priceSlider', priceMin, priceMax, PRICE_LO, PRICE_HI);
  paintTrack('scoreSlider', scoreMin, scoreMax, SCORE_LO, SCORE_HI);
}
function paintTrack(sliderId, lo, hi, absLo, absHi) {
  const fill = document.querySelector(`#${sliderId} .track-fill`);
  if (!fill) return;
  const span = absHi - absLo;
  const left = ((lo - absLo) / span) * 100;
  const right = ((absHi - hi) / span) * 100;
  fill.style.left = left + '%';
  fill.style.right = right + '%';
}
function bindDualRange(minId, maxId, absLo, absHi, setMin, setMax) {
  const minEl = document.getElementById(minId);
  const maxEl = document.getElementById(maxId);
  minEl.addEventListener('input', () => {
    let mn = parseFloat(minEl.value);
    if (mn > parseFloat(maxEl.value)) { mn = parseFloat(maxEl.value); minEl.value = mn; }
    setMin(mn);
    updateRangeDisplays();
    renderTable();
  });
  maxEl.addEventListener('input', () => {
    let mx = parseFloat(maxEl.value);
    if (mx < parseFloat(minEl.value)) { mx = parseFloat(minEl.value); maxEl.value = mx; }
    setMax(mx);
    updateRangeDisplays();
    renderTable();
  });
}
bindDualRange('priceMinInput', 'priceMaxInput', PRICE_LO, PRICE_HI,
  v => { priceMin = v; }, v => { priceMax = v; });
bindDualRange('scoreMinInput', 'scoreMaxInput', SCORE_LO, SCORE_HI,
  v => { scoreMin = v; }, v => { scoreMax = v; });

/* item picker dropdown */
const picker = document.getElementById('itemPicker');
const searchInput = document.getElementById('searchInput');
function openPicker() { picker.classList.add('open'); }
function closePicker() { picker.classList.remove('open'); }
searchInput.addEventListener('focus', openPicker);
searchInput.addEventListener('click', openPicker);
searchInput.addEventListener('mousedown', openPicker);
document.addEventListener('click', e => {
  if (!picker.classList.contains('open')) return;
  if (e.target.closest('#itemPicker') || e.target === searchInput) return;
  closePicker();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePicker(); });
document.getElementById('pickAll').addEventListener('click', () => {
  excludedIds.clear();
  localStorage.setItem('excludedIds', '[]');
  renderItemPicker();
  renderTable();
});
document.getElementById('pickNone').addEventListener('click', () => {
  excludedIds = new Set(ITEMS.map(i => i.id));
  localStorage.setItem('excludedIds', JSON.stringify([...excludedIds]));
  renderItemPicker();
  renderTable();
});

/* init */
document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
renderAll();
</script>
</body>
